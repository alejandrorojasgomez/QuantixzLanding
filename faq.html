<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FAQ — Quantixz | Preguntas frecuentes</title>
<meta name="description" content="Preguntas frecuentes sobre los servicios de branding, contenido y diseño de Quantixz." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  @font-face{font-family:"Axiforma";src:url("./fonts/Axiforma-Regular.woff2") format("woff2");font-weight:400;font-display:swap;}
  @font-face{font-family:"Axiforma";src:url("./fonts/Axiforma-Medium.woff2") format("woff2");font-weight:500;font-display:swap;}
  @font-face{font-family:"Axiforma";src:url("./fonts/Axiforma-Bold.woff2") format("woff2");font-weight:700;font-display:swap;}
  @font-face{font-family:"Axiforma";src:url("./fonts/Axiforma-Black.woff2") format("woff2");font-weight:900;font-display:swap;}
  :root{
    --c-bg:#160002;--c-accent:#e50c33;--c-cream:#ffedd9;--c-deep:#3a0008;--c-black:#0a0001;
    --c-cream-dim:#ffedd9b3;--c-cream-mut:#ffedd966;--c-line:#ffedd91a;
    --font-display:"Axiforma","Archivo",system-ui,sans-serif;
    --font-body:"Axiforma","Archivo",system-ui,sans-serif;
    --maxw:980px;--gutter:clamp(22px,5vw,80px);--ease:cubic-bezier(.2,.7,.2,1);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{background:var(--c-bg);color:var(--c-cream);font-family:var(--font-body);line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
  a{color:inherit;text-decoration:none;}
  ::selection{background:var(--c-accent);color:var(--c-cream);}
  .wrap{max-width:var(--maxw);margin:0 auto;padding-inline:var(--gutter);}
  .display{font-family:var(--font-display);font-weight:900;line-height:1;letter-spacing:-.02em;text-transform:uppercase;}

  .cursor-glow{position:fixed;top:0;left:0;width:360px;height:360px;border-radius:50%;pointer-events:none;z-index:9999;transform:translate3d(-50%,-50%,0);mix-blend-mode:screen;opacity:0;transition:opacity .4s;background:radial-gradient(circle,rgba(229,12,51,.24) 0%,rgba(229,12,51,.08) 32%,transparent 60%);filter:blur(8px);}
  .cursor-dot{position:fixed;top:0;left:0;width:7px;height:7px;border-radius:50%;background:var(--c-accent);pointer-events:none;z-index:10000;transform:translate3d(-50%,-50%,0);box-shadow:0 0 12px 2px rgba(229,12,51,.8);opacity:0;transition:opacity .3s;}
  @media (hover:none){.cursor-glow,.cursor-dot{display:none;}}

  header.site{position:fixed;top:0;left:0;right:0;z-index:60;display:flex;align-items:center;justify-content:space-between;padding:18px var(--gutter);background:rgba(10,0,1,.72);backdrop-filter:blur(12px);border-bottom:1px solid var(--c-line);}
  .brand{display:flex;align-items:center;gap:13px;}
  .brand img{width:38px;transition:transform .5s var(--ease);}
  .brand:hover img{transform:rotate(-12deg) scale(1.08);}
  .brand b{font-family:var(--font-display);font-weight:900;letter-spacing:.05em;font-size:1.05rem;text-transform:uppercase;}
  .back{font-size:.84rem;letter-spacing:.08em;color:var(--c-cream-dim);display:inline-flex;align-items:center;gap:8px;transition:color .25s;}
  .back:hover{color:var(--c-accent);}

  .aurora{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:0;}
  .blob{position:absolute;border-radius:50%;filter:blur(95px);width:60vw;height:60vw;max-width:740px;max-height:740px;top:-20%;left:-6%;opacity:.4;background:radial-gradient(circle at 40% 40%,var(--c-accent) 0%,rgba(229,12,51,.4) 34%,rgba(58,0,8,0) 70%);}

  .hero{position:relative;padding:160px 0 50px;}
  .hero .wrap{position:relative;z-index:2;}
  .hero .eyebrow{font-size:.8rem;letter-spacing:.34em;text-transform:uppercase;color:var(--c-accent);font-weight:600;display:inline-flex;align-items:center;gap:14px;margin-bottom:22px;}
  .hero .eyebrow::before{content:"";width:42px;height:1px;background:var(--c-accent);}
  .hero h1{font-size:clamp(3.4rem,15vw,9rem);}
  .hero h1 .accent{color:var(--c-accent);}
  .hero p.sub{color:var(--c-cream-dim);max-width:48ch;margin-top:22px;font-size:1.08rem;}

  .faqs{position:relative;padding:30px 0 clamp(90px,14vh,160px);}
  .faqitem{border-bottom:1px solid var(--c-line);}
  .faqitem button.q{width:100%;display:flex;align-items:center;justify-content:space-between;gap:24px;text-align:left;background:none;border:none;cursor:pointer;color:var(--c-cream);font-family:var(--font-display);font-weight:700;text-transform:none;letter-spacing:-.01em;font-size:clamp(1.15rem,2.6vw,1.7rem);padding:clamp(22px,3vw,30px) 0;transition:color .3s,padding-left .35s var(--ease);}
  .faqitem button.q:hover{color:var(--c-accent);padding-left:10px;}
  .faqitem .q .qmark{color:var(--c-accent);}
  .faqitem .plus{flex-shrink:0;width:26px;height:26px;position:relative;}
  .faqitem .plus::before,.faqitem .plus::after{content:"";position:absolute;background:var(--c-accent);transition:transform .35s var(--ease),opacity .35s;}
  .faqitem .plus::before{top:50%;left:0;right:0;height:2px;transform:translateY(-50%);}
  .faqitem .plus::after{left:50%;top:0;bottom:0;width:2px;transform:translateX(-50%);}
  .faqitem.open .plus::after{transform:translateX(-50%) scaleY(0);}
  .faqitem .a{overflow:hidden;max-height:0;transition:max-height .45s var(--ease),opacity .4s;opacity:0;}
  .faqitem.open .a{opacity:1;}
  .faqitem .a p{color:var(--c-cream-dim);font-size:1.05rem;padding:0 0 clamp(22px,3vw,30px);max-width:70ch;}

  .faq-cta{margin-top:clamp(50px,7vw,80px);border:1px solid var(--c-line);padding:clamp(30px,4vw,48px);display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:24px;background:linear-gradient(140deg,rgba(229,12,51,.12),#ffedd905);}
  .faq-cta h3{font-family:var(--font-display);font-weight:900;text-transform:uppercase;font-size:clamp(1.4rem,3vw,2.1rem);line-height:1.05;max-width:18ch;}
  .btn{display:inline-flex;align-items:center;gap:11px;font-size:.9rem;font-weight:600;padding:15px 28px;background:var(--c-accent);color:var(--c-cream);border:1px solid var(--c-accent);transition:transform .3s var(--ease),box-shadow .3s;}
  .btn:hover{transform:translateY(-3px);box-shadow:0 14px 30px -10px rgba(229,12,51,.6);}
  .btn .arrow{transition:transform .3s var(--ease);} .btn:hover .arrow{transform:translateX(4px);}

  footer{border-top:1px solid var(--c-line);padding:30px 0;}
  footer .wrap{display:flex;flex-wrap:wrap;justify-content:space-between;gap:16px;align-items:center;}
  footer small{color:var(--c-cream-mut);font-size:.76rem;}

  .reveal{opacity:0;transform:translateY(28px);transition:opacity .8s var(--ease),transform .8s var(--ease);}
  .reveal.in{opacity:1;transform:none;}
  @media (prefers-reduced-motion:reduce){.reveal{opacity:1;transform:none;transition:none;}.cursor-glow,.cursor-dot{display:none;}*,*::before,*::after{transition-duration:.001ms!important;}}
</style>
</head>
<body>
<div class="cursor-glow" aria-hidden="true"></div>
<div class="cursor-dot" aria-hidden="true"></div>

<header class="site">
  <a class="brand" href="./index.html" aria-label="Quantixz — inicio"><img src="./blanco.svg" alt="Logo Quantixz" /><b>Quantixz</b></a>
  <a class="back" href="./index.html">&larr; Volver al inicio</a>
</header>

<section class="hero">
  <div class="aurora"><div class="blob"></div></div>
  <div class="wrap">
    <span class="eyebrow">Preguntas frecuentes</span>
    <h1 class="display">FAQ<span class="accent">'s</span></h1>
    <p class="sub">Lo que casi siempre nos preguntan. &iquest;No ves tu duda? Escr&iacute;benos, con gusto te atendemos.</p>
  </div>
</section>

<section class="faqs">
  <div class="wrap" id="faqList"></div>
</section>

<footer>
  <div class="wrap">
    <a class="brand" href="./index.html"><img src="./blanco.svg" alt="" style="width:28px"/><b>Quantixz</b></a>
    <small>&copy; <span id="year"></span> Quantixz · Alejandro Rojas G&oacute;mez</small>
  </div>
</footer>

<script>
  const FAQS=[
    {q:"¿Dónde se realizarían las sesiones fotográficas?",a:"Las sesiones se realizan en tus establecimientos o en un lugar específico que acordemos contigo según el proyecto."},
    {q:"¿Qué pasa si quiero ajustar los servicios de un plan?",a:"Todo es personalizable. Adaptamos las características a tus necesidades específicas, con su respectivo ajuste en el precio y los servicios ofrecidos."},
    {q:"¿Cómo se arma el presupuesto?",a:"Cada presupuesto se construye a tu medida. No vendemos paquetes rígidos: definimos juntos el alcance y armamos una propuesta que se ajuste a tus posibilidades sin sacrificar calidad."},
    {q:"¿Qué incluye la asesoría?",a:"Orientación en estrategias de contenido, diseño o publicidad. En planes avanzados incluye análisis detallado de campañas publicitarias."},
    {q:"¿Cómo se planifica el contenido mensual?",a:"Trabajamos contigo para identificar tus objetivos, eventos clave y celebraciones relevantes para tu marca. Te entregamos un calendario con la programación del contenido."},
    {q:"¿Quién elige los temas o el enfoque del contenido?",a:"Puedes sugerir ideas o dejar que nuestro equipo creativo proponga estrategias alineadas con tu marca."},
    {q:"¿Los precios incluyen la pauta publicitaria?",a:"No. Los precios son exclusivamente por la creación y planificación de contenido, pero te asesoramos en cómo gestionar tu presupuesto publicitario."},
    {q:"¿Ofrecen facilidades de pago?",a:"Sí. Manejamos planes de pago accesibles para que puedas invertir en una identidad de alto impacto sin agotar tus recursos."},
    {q:"¿Cómo puedo hacer consultas adicionales fuera de la asesoría?",a:"Puedes escribirnos por chat en cualquier momento para resolver dudas o solicitar ajustes menores en el contenido."}
  ];
  (function(){
    const wrap=document.getElementById("faqList");
    FAQS.forEach((f,i)=>{
      const item=document.createElement("div");
      item.className="faqitem reveal";
      const qHtml=f.q.replace(/^¿/,'<span class="qmark">¿</span>').replace(/\?$/,'<span class="qmark">?</span>');
      item.innerHTML='<button class="q" aria-expanded="false"><span>'+qHtml+'</span><span class="plus" aria-hidden="true"></span></button>'+
        '<div class="a"><p>'+f.a+'</p></div>';
      const btn=item.querySelector("button"), ans=item.querySelector(".a");
      btn.addEventListener("click",()=>{
        const open=item.classList.toggle("open");
        btn.setAttribute("aria-expanded",open?"true":"false");
        ans.style.maxHeight=open?ans.scrollHeight+"px":"0";
      });
      wrap.appendChild(item);
    });
    // reveal
    const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add("in");io.unobserve(e.target);}}),{threshold:.1});
    document.querySelectorAll(".reveal").forEach(n=>io.observe(n));
  })();

  // CTA al final
  const wrap=document.getElementById("faqList");
  const cta=document.createElement("div");
  cta.className="faq-cta reveal";
  cta.innerHTML='<h3>¿Otra duda? Con gusto te atendemos.</h3><a class="btn" href="./index.html#contact">Hablemos <span class="arrow">&rarr;</span></a>';
  wrap.appendChild(cta);

  document.getElementById("year").textContent=new Date().getFullYear();

  // cursor glow
  const reduce=matchMedia("(prefers-reduced-motion: reduce)").matches;
  if(!reduce && matchMedia("(hover:hover)").matches){
    const glow=document.querySelector(".cursor-glow"),dot=document.querySelector(".cursor-dot");
    let gx=innerWidth/2,gy=innerHeight/2,tx=gx,ty=gy;
    addEventListener("mousemove",e=>{tx=e.clientX;ty=e.clientY;dot.style.left=e.clientX+"px";dot.style.top=e.clientY+"px";glow.style.opacity="1";dot.style.opacity="1";},{passive:true});
    (function loop(){gx+=(tx-gx)*.14;gy+=(ty-gy)*.14;glow.style.left=gx+"px";glow.style.top=gy+"px";requestAnimationFrame(loop);})();
  }
</script>
</body>
</html>
